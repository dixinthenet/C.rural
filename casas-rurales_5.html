<style>

    --accent-light: #f2e0d8;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {

    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  header {
    background: var(--ink);
    color: var(--bg);
    padding: 32px 24px 28px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(200,80,42,.18);
    pointer-events: none;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 700;
    letter-spacing: -.5px;
  }
  header h1 em { font-style: italic; color: #e8a080; }
  .meta {
    margin-top: 8px;
    opacity: .65;
    font-weight: 300;
    font-size: 13px;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 16px 20px;
    background: white;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .controls label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .controls select, .controls input {
    padding: 6px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    outline: none;
    transition: border-color .2s;
  }
  .controls select:focus, .controls input:focus { border-color: var(--accent); }
  .filter-group { display: flex; flex-direction: column; gap: 3px; }
  .count-badge {
    margin-left: auto;
    align-self: flex-end;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }
  main { padding: 20px; display: grid; gap: 14px; }

  .card {
    background: var(--card-bg);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr;
    transition: transform .15s, box-shadow .15s;
    animation: fadeIn .35s ease forwards;
    opacity: 0;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,.1); }
  @keyframes fadeIn { to { opacity:1; } }

  .card-top {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    align-items: stretch;
  }
  .card-left {
    flex: 1;
    min-width: 220px;
    padding: 18px 20px 14px;
    border-right: 1px solid var(--border);
  }
  .card-right {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 14px 18px;
    flex: 2;
    min-width: 280px;
    align-content: flex-start;
  }
  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.25;
    color: var(--ink);
  }
  .card-loc {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .card-loc::before { content: '📍'; font-size: 11px; }
  .rating-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .rating {
    background: var(--ink);
    color: white;
    font-weight: 700;
    font-size: 15px;
    padding: 3px 9px;
    border-radius: 8px;
    letter-spacing: .5px;
  }
  .rating.great { background: var(--green); }
  .rating.good { background: var(--warn); color: white; }
  .rating.na { background: #aaa; }
  .rating-label { font-size: 12px; color: var(--muted); }

  .dist-tag {
    font-size: 12px;
    color: #555;
    margin: 4px 0 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .dist-tag strong { color: #222; }
  .price-tag {
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
  }
  .price-tag strong { font-size: 18px; color: var(--ink); font-weight: 700; }
  .price-tag span { font-size: 11px; }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
  }
  .pill-yes { background: var(--green-light); color: var(--green); }
  .pill-warn { background: var(--warn-light); color: var(--warn); }
  .pill-no { background: #f0f0f0; color: #999; }
  .pill-extra { background: #e8eeff; color: #3a4f9a; }
  .pill-zone { background: var(--accent-light); color: var(--accent); }

  .amen-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 8px 16px;
    background: #f9f8f5;
    border-top: 1px solid var(--border);
    font-size: 12px;
  }
  .card-note {
    padding: 10px 18px 14px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }
  .highlight-note {
    padding: 8px 14px;
    background: var(--warn-light);
    border-top: 1px solid #f0d890;
    font-size: 12px;
    color: var(--warn);
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .booking-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    text-decoration: none;
    padding: 4px 10px;
    border: 1.5px solid var(--accent-light);
    border-radius: 8px;
    transition: background .15s;
  }
  .booking-link:hover { background: var(--accent-light); }

  .hidden { display: none !important; }

  @media (max-width: 540px) {
    .card-left { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>

function ratingClass(r) {
  if (r === null) return 'na';
  if (r >= 9.5) return 'great';
  if (r >= 8.5) return 'good';
  return '';
}

function render() {
  const sortBy = document.getElementById('sortSel').value;
  const piscinaF = document.getElementById('piscinaFil').value;
  const zonaF = document.getElementById('zonaFil').value;
  const distF = document.getElementById('distFil').value;

  let data = houses.filter(h => {
    if (piscinaF === 'yes' && h.piscinaMayo !== true) return false;
    if (piscinaF === 'no' && h.piscinaMayo !== false) return false;
    if (zonaF !== 'all' && h.zone !== zonaF) return false;
    if (distF !== 'all' && h.kmAvila > parseInt(distF)) return false;
    return true;
  });

  if (sortBy === 'rating') {
    data.sort((a, b) => (b.rating || 0) - (a.rating || 0));
  } else if (sortBy === 'zone') {
    data.sort((a, b) => a.zone.localeCompare(b.zone) || (b.rating || 0) - (a.rating || 0));
  } else if (sortBy === 'price') {
    data.sort((a, b) => {
      if (a.precio === null && b.precio === null) return 0;
      if (a.precio === null) return 1;
      if (b.precio === null) return -1;
      return a.precio - b.precio;
    });
  } else if (sortBy === 'dist') {
    data.sort((a, b) => a.kmAvila - b.kmAvila);
  }

  document.getElementById('countBadge').textContent = `${data.length} alojamiento${data.length !== 1 ? 's' : ''}`;

  const main = document.getElementById('main');
  main.innerHTML = '';

  data.forEach((h, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 0.04}s`;

    const piscPill = h.piscinaMayo === true
      ? `<span class="pill pill-yes">🏊 Piscina ✓</span>`
      : h.piscinaMayo === false
      ? `<span class="pill pill-no">🏊 Sin piscina</span>`
      : `<span class="pill pill-no">🏊 Por confirmar</span>`;

    const barbPill = h.barbacoa === true
      ? `<span class="pill pill-yes">🔥 Barbacoa ✓</span>`
      : h.barbacoa === false
      ? `<span class="pill pill-no">🔥 Sin barbacoa</span>`
      : `<span class="pill pill-no">🔥 Por confirmar</span>`;

    const habitPill = h.hab
      ? `<span class="pill pill-extra">🛏 ${h.hab} hab.</span>`
      : '';
    const plazasPill = h.plazas
      ? `<span class="pill pill-extra">👥 ${h.plazas} plazas</span>`
      : '';
    const zonePill = `<span class="pill pill-zone">📍 ${h.zone}</span>`;

    const extrasPills = h.extras.slice(0, 5).map(e =>
      `<span class="pill" style="background:#f4f4f4;color:#555">${e}</span>`
    ).join('');

    function amenIcon(val, label) {
      if (val === true) return `<span style="color:#2d6a4f;font-weight:500">✓ ${label}</span>`;
      if (val === false) return `<span style="color:#c0392b;font-weight:500">✗ ${label}</span>`;
      return `<span style="color:#aaa">? ${label}</span>`;
    }
    const amenRow = (h.wifi !== undefined || h.ac !== undefined || h.lavadora !== undefined) ? `
      <div class="amen-row">
        ${amenIcon(h.wifi,'WiFi')}
        ${amenIcon(h.ac,'A/C')}
        ${amenIcon(h.lavadora,'Lavadora')}
        ${amenIcon(h.lavavajillas,'Lavavajillas')}
        ${h.banios ? `<span style="color:#555">🚿 ${h.banios} baños</span>` : ''}
        ${amenIcon(h.chimenea,'Chimenea')}
      </div>` : '';

    const ratingHtml = h.rating !== null
      ? `<span class="rating ${ratingClass(h.rating)}">${h.rating.toFixed(1)}</span><span class="rating-label">Booking</span>`
      : `<span class="rating na">—</span><span class="rating-label">Sin datos</span>`;

    const priceHtml = h.precio
      ? `<div class="price-tag">~<strong>€${h.precio}</strong><span>/finde · €${Math.round(h.precio/7)}/persona</span></div>`
      : `<div class="price-tag" style="color:#bbb;font-size:11px">Precio: consultar en Booking</div>`;

    const distHtml = `<div class="dist-tag">🚗 <strong>${h.kmAvila} km</strong> desde Ávila · ~${h.minAvila >= 60 ? Math.floor(h.minAvila/60)+'h '+((h.minAvila%60)?h.minAvila%60+'min':'') : h.minAvila+'min'}</div>`;

    const warningHtml = h.warning
      ? `<div class="highlight-note"><span>⚠️</span><span>${h.warning}</span></div>`
      : '';

    card.innerHTML = `
      <div class="card-top">
        <div class="card-left">
          <div class="card-name">${h.name}</div>
          <div class="card-loc">${h.loc}</div>
          <div class="rating-row">${ratingHtml}</div>
          ${priceHtml}
          ${distHtml}
          <a class="booking-link" href="${h.url}" target="_blank">🔗 Ver en Booking</a>
        </div>
        <div class="card-right">
          ${zonePill}
          ${piscPill}
          ${barbPill}
          ${habitPill}
          ${plazasPill}
          ${extrasPills}
        </div>
      </div>
      ${amenRow}
      ${h.nota ? `<div class="card-note">💬 ${h.nota}</div>` : ''}
      ${warningHtml}
    `;
    main.appendChild(card);
  });
}

render();
</script>
